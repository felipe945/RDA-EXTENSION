<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FanBasis</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="panel">

    <!-- ── Header ─────────────────────────────────────────────────────── -->
    <header class="header">
      <div class="header-left">
        <span class="logo">FanBasis</span>
        <span id="syncDot" class="sync-dot" title="Synced"></span>
        <span id="account-pill" class="account-pill" style="display:none">
          <span class="account-dot"></span>
          <span id="account-label"></span>
        </span>
      </div>
      <div class="header-right">
        <button id="refreshBtn" class="icon-btn" title="Refresh">↺</button>
        <button id="openDashboard" class="icon-btn" title="Open full dashboard">⬡</button>
      </div>
    </header>

    <!-- ── Tab bar ────────────────────────────────────────────────────── -->
    <nav class="tab-bar">
      <button class="tab active" data-tab="notifs">
        🔔 Inbox <span id="inboxBadge" class="tab-badge" style="display:none"></span>
      </button>
      <button class="tab" data-tab="leads">Leads</button>
      <button class="tab" data-tab="outreach">Outreach</button>
      <button class="tab" data-tab="scripts">Scripts</button>
    </nav>

    <!-- ── Quick save bar ───────────────────────────────────────────────── -->
    <div id="quick-save-bar" style="display:none">
      <span id="current-user"></span>
      <button id="quick-save-btn" class="btn-quick-save">💾 Save Lead</button>
    </div>

    <!-- ── Notifications tab ──────────────────────────────────────────── -->
    <div id="tab-notifs" class="tab-content active-tab">
      <div id="notifList" class="scroll-area"></div>
    </div>

    <!-- ── Pipeline / Leads tab ───────────────────────────────────────── -->
    <div id="tab-leads" class="tab-content">
      <!-- Stats row -->
      <div id="statsRow" class="stats-row"></div>

      <!-- Filter pills -->
      <div class="filter-bar">
        <button class="filter active" data-filter="all">All</button>
        <button class="filter" data-filter="needs_fu">🔥 FU</button>
        <button class="filter" data-filter="replied">💬 Replied</button>
        <button class="filter" data-filter="booked">✓ Booked</button>
        <button class="filter" data-filter="new">New</button>
      </div>

      <!-- Quick add -->
      <div class="quick-add">
        <input id="trackName" placeholder="@username or name" />
        <select id="trackSource">
          <option value="IG">IG</option>
          <option value="LinkedIn">LinkedIn</option>
          <option value="Email">Email</option>
          <option value="Manual">Other</option>
        </select>
        <button id="trackBtn" class="btn-add">+</button>
      </div>

      <div id="leadList" class="scroll-area"></div>
    </div>

    <!-- ── Outreach tab ────────────────────────────────────────────────── -->
    <div id="tab-outreach" class="tab-content">
      <div id="outreachCount" class="outreach-meta"></div>
      <div id="outreachList" class="scroll-area"></div>
    </div>

    <!-- ── Scripts tab ────────────────────────────────────────────────── -->
    <div id="tab-scripts" class="tab-content">
      <div class="scripts-filter">
        <select id="scriptCategory" class="scripts-select"></select>
      </div>
      <div id="scriptList" class="scroll-area"></div>
    </div>

  </div><!-- /.panel -->

  <!-- ── Settings ────────────────────────────────────────────────────── -->
  <details class="settings-section">
    <summary>⚙ Settings</summary>
    <div class="settings-body">
      <label>Dashboard URL
        <input id="settingsDashboardUrl" placeholder="https://unified-sales-ops.vercel.app" />
      </label>
      <label>IG Events Secret
        <input id="settingsIgSecret" type="password" placeholder="from Vercel env IG_EVENTS_SECRET" />
      </label>
      <label>FanBasis IG Handle
        <input id="settingsFbHandle" placeholder="e.g. fanbasis_official" />
      </label>
      <label>Personal IG Handle
        <input id="settingsPersonalHandle" placeholder="e.g. your_personal_handle" />
      </label>
      <label>Calendar Booking Link
        <input id="settingsCalendarUrl" placeholder="e.g. https://calendly.com/you/45min" />
      </label>
      <hr style="border:none;border-top:1px solid #1e1e2a;margin:14px 0 12px">
      <div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#5c5c78;margin-bottom:10px">Google Calendar</div>

      <!-- Not connected state -->
      <div id="calDisconnected">
        <p style="font-size:11px;color:#555;line-height:1.5;margin-bottom:8px">Connect Google Calendar to auto-generate booking DMs with your real open slots.</p>
        <button id="calConnectBtn" style="width:100%;background:#0f2540;border:1px solid #1d4ed8;border-radius:7px;color:#93c5fd;font-size:12px;font-weight:600;padding:8px;cursor:pointer">Connect Google Calendar</button>
        <p id="calClientIdNote" style="font-size:10px;color:#555;margin-top:8px;line-height:1.5;display:none">⚠ Add your OAuth client_id to manifest.json first — see the setup guide in the build plan.</p>
      </div>

      <!-- Connected state -->
      <div id="calConnected" style="display:none">
        <div id="calConnectedAs" style="font-size:11px;color:#22c55e;margin-bottom:10px;display:flex;align-items:center;gap:5px">
          <span style="width:6px;height:6px;border-radius:50%;background:#22c55e;display:inline-block"></span>
          Connected
        </div>
        <div style="font-size:10px;font-weight:600;letter-spacing:.06em;color:#5c5c78;text-transform:uppercase;margin-bottom:6px">Include in availability</div>
        <div id="calListWrap" style="display:flex;flex-direction:column;gap:4px;margin-bottom:10px"></div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <span style="font-size:11px;color:#666">Slot duration</span>
          <select id="calSlotMins" style="flex:1;background:#1a1a1a;border:1px solid #2a2a35;border-radius:5px;color:#ddd;font-size:11px;padding:4px 7px">
            <option value="15">15 min</option>
            <option value="30">30 min</option>
            <option value="45" selected>45 min</option>
            <option value="60">60 min</option>
          </select>
        </div>
        <div style="display:flex;gap:7px">
          <button id="calSaveBtn" class="btn-save" style="flex:1">Save calendar settings</button>
          <button id="calDisconnectBtn" style="background:#161616;border:1px solid #2a1a1a;border-radius:6px;color:#666;font-size:11px;padding:5px 10px;cursor:pointer">Disconnect</button>
        </div>
        <span id="calSaved" style="font-size:11px;color:#22c55e;display:none;margin-top:6px">✓ Saved</span>
      </div>

      <div class="settings-footer">
        <button id="saveSettings" class="btn-save">Save</button>
        <span id="settingsSaved" class="saved-indicator" style="display:none">✓ Saved</span>
      </div>
    </div>
  </details>

  <script src="scripts-data.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>

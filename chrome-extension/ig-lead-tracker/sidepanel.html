<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sales Ops</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div id="app">
    <header id="sp-header">
      <div class="sp-logo"></div>
      <span class="sp-title">Sales Ops</span>
      <span id="sp-urgent-badge" class="sp-urgent-badge" style="display:none">0</span>
    </header>
    <nav id="sp-tabs">
      <button class="sp-tab active" data-tab="leads">Leads</button>
      <button class="sp-tab" data-tab="scripts">Scripts</button>
      <button class="sp-tab" data-tab="inbox">Inbox</button>
    </nav>
    <div id="sp-search-bar">
      <input id="sp-search" type="text" placeholder="Search leads&hellip;" />
    </div>
    <div id="sp-content"></div>
    <div id="sp-footer">
      <button id="sp-save-btn" class="sp-save-btn">&#xff0b; Save current profile</button>
    </div>
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>

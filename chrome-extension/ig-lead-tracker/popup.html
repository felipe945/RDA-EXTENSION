<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FanBasis IG</title>
  <style>
    body { font-family: -apple-system, sans-serif; background: #0a0d14; color: #e2e8f0; width: 220px; padding: 14px; }
    h3 { font-size: 13px; color: #60a5fa; margin-bottom: 10px; }
    button {
      width: 100%; padding: 8px; margin-bottom: 6px;
      background: #1a2035; border: 1px solid #2d3748;
      color: #cbd5e1; border-radius: 6px; cursor: pointer; font-size: 12px;
    }
    button:hover { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }
    #stats { font-size: 11px; color: #475569; margin-top: 8px; }
  </style>
</head>
<body>
  <h3>FanBasis IG Tracker</h3>
  <button id="openPanel">Open Side Panel</button>
  <button id="openDashboard">Full Dashboard</button>
  <div id="stats">Loading...</div>
  <script>
    document.getElementById("openPanel").addEventListener("click", () => {
      chrome.sidePanel.open({ windowId: undefined });
      window.close();
    });
    document.getElementById("openDashboard").addEventListener("click", () => {
      chrome.tabs.create({ url: chrome.runtime.getURL("dashboard.html") });
      window.close();
    });
    chrome.storage.local.get({ leads: {} }, ({ leads }) => {
      const all = Object.values(leads);
      const overdue = all.filter((l) => l.dueAt && l.dueAt < Date.now() && !["Closed","DQ"].includes(l.stage)).length;
      document.getElementById("stats").textContent = `${all.length} leads · ${overdue} overdue`;
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FanMas — Dashboard</title>
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>
  <header class="dash-header">
    <h1>FanMas</h1>
    <div class="header-actions">
      <button id="addLead">+ Add Lead</button>
      <span id="totalCount" class="count-badge"></span>
    </div>
  </header>

  <div class="filter-bar">
    <button class="filter active" data-filter="all">All</button>
    <button class="filter" data-filter="overdue">Overdue</button>
    <button class="filter" data-filter="today">Due Today</button>
    <button class="filter" data-filter="upcoming">Upcoming</button>
    <button class="filter" data-filter="booked">Booked</button>
    <button class="filter" data-filter="archived">Archived</button>
  </div>

  <main id="buckets"></main>

  <script src="scripts-data.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IG Lead Tracker</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">

  <!-- Header -->
  <div id="header">
    <span class="logo">⚡ Tracker</span>
    <div class="header-right">
      <button id="open-dashboard-btn" class="icon-btn" title="Open Dashboard">↗</button>
      <button id="settings-btn" class="icon-btn" title="Settings">⚙</button>
    </div>
  </div>

  <!-- Quick save bar (shown when on a profile) -->
  <div id="quick-save-bar" class="hidden">
    <span id="current-user" class="current-user"></span>
    <button id="quick-save-btn" class="btn-pink btn-sm">＋ Save</button>
  </div>

  <!-- Tabs -->
  <div id="tabs">
    <button class="tab-btn active" data-tab="actions">Actions</button>
    <button class="tab-btn" data-tab="leads">Leads</button>
    <button class="tab-btn" data-tab="scripts">Scripts</button>
  </div>

  <!-- ACTIONS TAB -->
  <div id="tab-actions" class="tab-panel active">

    <div class="section-label">Voice Messages</div>
    <div id="vm-list"></div>

    <div class="section-label" style="margin-top:10px">Quick Links</div>
    <div id="links-list"></div>

    <div id="actions-empty" class="empty-state hidden">
      No quick actions yet.<br>Open ⚙ Settings to add VMs and links.
    </div>

  </div>

  <!-- LEADS TAB -->
  <div id="tab-leads" class="tab-panel hidden">
    <div id="leads-list">
      <div class="empty-state">No leads yet.<br>Browse IG and tap ＋ Save on any profile.</div>
    </div>
  </div>

  <!-- SCRIPTS TAB -->
  <div id="tab-scripts" class="tab-panel hidden">
    <div id="scripts-filter" class="scripts-filter"></div>
    <div id="scripts-list"></div>
  </div>

  <!-- SETTINGS OVERLAY -->
  <div id="settings-overlay" class="hidden">
    <div class="overlay-header">
      <span>Settings</span>
      <button id="settings-close-btn" class="icon-btn">✕</button>
    </div>

    <label class="field-label">Dashboard URL</label>
    <input id="input-url" class="field-input" type="text" placeholder="http://localhost:3000">

    <label class="field-label">IG Secret</label>
    <input id="input-secret" class="field-input" type="text" placeholder="fanbasis-ig-2026">

    <div class="overlay-section-label">Voice Messages</div>
    <p class="overlay-hint">Record a VM to yourself on IG, paste the DM link here.</p>
    <div id="vm-settings"></div>
    <button id="add-vm-btn" class="btn-ghost btn-sm">+ Add VM</button>

    <div class="overlay-section-label">Quick Links</div>
    <p class="overlay-hint">Loom, Calendly, case study — one tap to copy.</p>
    <div id="link-settings"></div>
    <button id="add-link-btn" class="btn-ghost btn-sm">+ Add Link</button>

    <div class="overlay-footer">
      <button id="settings-save-btn" class="btn-pink">Save Settings</button>
    </div>
  </div>

</div>
<script src="scripts-data.js"></script>
<script src="sidepanel.js"></script>
</body>
</html>
